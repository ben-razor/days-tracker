<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Days Tracker</title>
<style>
  @font-face {
    font-family: 'system-serif';
    src: local('Georgia');
  }

  :root {
    --ink: #2B3346;
    --ink-soft: #5B6478;
    --page-bg: #FBF1DE;
    --parchment: #FFFCF5;
    --stamp-red: #E2604F;
    --teal: #2FA79D;
    --gold: #EEA83C;
    --line: rgba(43, 51, 70, 0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--page-bg);
    color: var(--ink);
    line-height: 1.4;
  }

  .font-display { font-family: Georgia, 'Times New Roman', serif; }
  .font-mono { font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace; }

  .wrap { min-height: 100vh; padding-bottom: 4rem; }

  .header {
    padding: 3.5rem 2rem 2.5rem;
    text-align: center;
  }
  .header-inner { max-width: 720px; margin: 0 auto; }
  .eyebrow {
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 0.68rem;
  }
  .header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 700;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    color: var(--ink);
    margin: 0.75rem 0 0.6rem;
  }
  .header p.sub {
    color: var(--ink-soft);
    font-size: 0.95rem;
    margin: 0;
  }

  .container { max-width: 1080px; margin: 0 auto; padding: 0 1.5rem; }

  .paper {
    background-color: var(--parchment);
    border: 1px solid var(--line);
    box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset, 0 18px 40px -22px rgba(0,0,0,0.45);
    border-radius: 10px;
  }

  .card { padding: 1.75rem; margin-bottom: 2rem; }

  .card-title {
    font-family: Georgia, serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0 0 1.25rem;
  }

  .hairline-gold {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0.75rem 0;
  }

  .row { display: flex; gap: 2rem; align-items: flex-end; flex-wrap: wrap; }

  .field label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--ink-soft);
  }
  .field input[type="date"] {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--line);
    border-radius: 0;
    padding: 0.5rem 0.1rem;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 0.92rem;
    color: var(--ink);
    outline: none;
  }
  .field input[type="date"]:focus { border-bottom-color: var(--stamp-red); }

  .btn {
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--parchment);
    padding: 0.7rem 1.5rem;
    border-radius: 4px;
    border: none;
    cursor: pointer;
  }
  .btn:hover { background: var(--ink-soft); }
  .btn.teal { background: var(--teal); }
  .btn.teal:hover { background: #245853; }
  .btn.gold { background: var(--gold); color: var(--ink); }
  .btn.gold:hover { background: #b7872f; }

  .trip-list { margin-top: 1.75rem; }
  .trip-list-label { margin-bottom: 0.75rem; color: var(--ink-soft); }
  .ticket {
    background: var(--parchment);
    border: 1px solid var(--line);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem;
    margin-bottom: 0.6rem;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 0.9rem;
  }
  .ticket .arrow { color: var(--stamp-red); padding: 0 0.5rem; }
  .ticket button {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 0.68rem;
    color: var(--stamp-red);
  }

  .total-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    padding: 2rem;
    flex-wrap: wrap;
  }
  .total-text p.desc { color: var(--ink-soft); font-size: 0.9rem; max-width: 360px; margin: 0.5rem 0 0; }

  .stamp {
    width: 168px;
    height: 168px;
    min-width: 110px;
    border-radius: 999px;
    border: 3px solid var(--stamp-red);
    outline: 1px solid var(--stamp-red);
    outline-offset: 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--stamp-red);
    background: repeating-conic-gradient(from 0deg, rgba(174,59,38,0.05) 0deg 2deg, transparent 2deg 8deg);
    flex-shrink: 0;
  }
  .stamp .num { font-family: Georgia, serif; font-size: 2.75rem; font-weight: 700; line-height: 1; }
  .stamp .lbl {
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .result {
    border-top: 1.5px dashed var(--line);
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    font-family: Georgia, serif;
    font-size: 1.7rem;
    font-weight: 700;
  }
  .result .caption {
    display: block;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--ink-soft);
    margin-top: 0.25rem;
  }

  .pages-label { color: var(--ink-soft); margin-bottom: 1rem; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
  }
  .cal-card { padding: 1.25rem; }
  .cal-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.5rem;
  }
  .cal-head h3 { font-family: Georgia, serif; font-size: 1.1rem; margin: 0; }
  .cal-head .count {
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: var(--stamp-red);
  }
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 0.4rem;
  }
  .cal-weekdays span {
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 0.62rem;
    font-weight: 600;
    text-align: center;
    color: var(--ink-soft);
    opacity: 0.6;
  }
  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-days .cell {
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    font-size: 0.78rem;
  }
  .cal-days .cell.in-trip {
    background: var(--stamp-red);
    color: var(--parchment);
    border-radius: 999px;
    font-weight: 600;
  }
  .cal-days .cell.weekend { color: var(--ink-soft); opacity: 0.55; }

  .empty-state { text-align: center; padding: 4.5rem 1.5rem; }
  .empty-state .stamp { margin: 0 auto 1.5rem; opacity: 0.35; width: 110px; height: 110px; }
  .empty-state h3 { font-family: Georgia, serif; font-size: 1.3rem; margin: 0 0 0.35rem; }
  .empty-state p { color: var(--ink-soft); font-size: 0.9rem; margin: 0; }

  ::selection { background: var(--gold); color: var(--ink); }

  @media (max-width: 640px) {
    .row { gap: 1.25rem; }
    .total-card { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script>
    // ---------- state ----------
    let trips = [];
    let newTrip = { start: '', end: '' };
    let customRange = { start: '', end: '' };
    let customDays = null;
    let rollingDate = '';
    let rollingDays = null;

    // ---------- helpers ----------
    function dateToString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function isDateInTrips(date) {
      const dateStr = dateToString(date);
      return trips.some(trip => dateStr >= trip.start && dateStr <= trip.end);
    }

    function getTotalDays() {
      const allDates = new Set();
      trips.forEach(trip => {
        const start = new Date(trip.start + 'T00:00:00');
        const end = new Date(trip.end + 'T00:00:00');
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          allDates.add(dateToString(d));
        }
      });
      return allDates.size;
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    function getFirstDayOfMonth(year, month) {
      return new Date(year, month, 1).getDay();
    }

    function getMonthDays(year, month) {
      const daysInMonth = getDaysInMonth(year, month);
      let count = 0;
      for (let day = 1; day <= daysInMonth; day++) {
        if (isDateInTrips(new Date(year, month, day))) count++;
      }
      return count;
    }

    function getMonthsToDisplay() {
      if (trips.length === 0) return [];
      const allDates = trips.flatMap(trip => [
        new Date(trip.start + 'T00:00:00'),
        new Date(trip.end + 'T00:00:00')
      ]);
      const minDate = new Date(Math.min(...allDates));
      const maxDate = new Date(Math.max(...allDates));
      const months = [];
      const current = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
      const end = new Date(maxDate.getFullYear(), maxDate.getMonth(), 1);
      while (current <= end) {
        months.push(new Date(current));
        current.setMonth(current.getMonth() + 1);
      }
      return months;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ---------- renderers ----------
    function renderCalendar(monthDate) {
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      const daysInMonth = getDaysInMonth(year, month);
      const firstDay = getFirstDayOfMonth(year, month);
      const monthDays = getMonthDays(year, month);

      let cells = '';
      for (let i = 0; i < firstDay; i++) {
        cells += `<div class="cell"></div>`;
      }
      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        const inTrip = isDateInTrips(date);
        const weekend = date.getDay() === 0 || date.getDay() === 6;
        const cls = inTrip ? 'cell in-trip' : (weekend ? 'cell weekend' : 'cell');
        cells += `<div class="${cls}">${day}</div>`;
      }

      const monthLabel = monthDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      return `
        <div class="paper cal-card">
          <div class="cal-head">
            <h3>${escapeHtml(monthLabel)}</h3>
            <span class="count">${monthDays} ${monthDays === 1 ? 'DAY' : 'DAYS'}</span>
          </div>
          <div class="hairline-gold"></div>
          <div class="cal-weekdays">
            <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
          </div>
          <div class="cal-days">${cells}</div>
        </div>
      `;
    }

    function fmt(dateStr) {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString();
    }

    function render() {
      const root = document.getElementById('root');

      let tripListHtml = '';
      if (trips.length > 0) {
        tripListHtml = `
          <div class="trip-list">
            <p class="eyebrow trip-list-label">Recorded Trips</p>
            <div>
              ${trips.map((trip, i) => `
                <div class="ticket">
                  <span>${fmt(trip.start)}<span class="arrow">&nbsp;&rarr;&nbsp;</span>${fmt(trip.end)}</span>
                  <button data-remove="${i}">Remove</button>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      let mainSections = '';
      if (trips.length > 0) {
        const total = getTotalDays();

        let customResult = '';
        if (customDays !== null) {
          customResult = `
            <div class="result" style="color: var(--teal);">
              ${customDays} ${customDays === 1 ? 'day' : 'days'}
              <span class="caption">spent in country during this period</span>
            </div>
          `;
        }

        let rollingResult = '';
        if (rollingDays !== null && rollingDate) {
          const endDate = new Date(rollingDate + 'T00:00:00');
          const startDate = new Date(endDate.getTime() - 179 * 24 * 60 * 60 * 1000);
          rollingResult = `
            <div class="result" style="color: var(--gold);">
              ${rollingDays} ${rollingDays === 1 ? 'day' : 'days'}
              <span class="caption">From ${startDate.toLocaleDateString()} to ${endDate.toLocaleDateString()}</span>
            </div>
          `;
        }

        const calendars = getMonthsToDisplay().map(renderCalendar).join('');

        mainSections = `
          <div class="paper card total-card">
            <div class="total-text">
              <p class="eyebrow" style="color: var(--teal); margin:0 0 0.25rem;">Ledger Total</p>
              <h2 class="card-title" style="margin-bottom:0;">Total Days in Country</h2>
              <p class="desc">Every unique calendar day covered by a recorded trip, counted once even if entries overlap.</p>
            </div>
            <div class="stamp">
              <span class="num">${total}</span>
              <span class="lbl">${total === 1 ? 'Day' : 'Days'}</span>
            </div>
          </div>

          <div class="paper card">
            <p class="eyebrow" style="color: var(--teal); margin:0 0 0.25rem;">Entry 02</p>
            <h2 class="card-title">Days Between Custom Dates</h2>
            <div class="row">
              <div class="field">
                <label>From</label>
                <input type="date" id="customStart" value="${customRange.start}">
              </div>
              <div class="field">
                <label>To</label>
                <input type="date" id="customEnd" value="${customRange.end}">
              </div>
              <button class="btn teal" id="calcCustom">Calculate</button>
            </div>
            ${customResult}
          </div>

          <div class="paper card">
            <p class="eyebrow" style="color: var(--gold); margin:0 0 0.25rem;">Entry 03</p>
            <h2 class="card-title" style="margin-bottom:0.5rem;">Rolling 180-Day Window</h2>
            <p style="color: var(--ink-soft); font-size:0.9rem; margin:0 0 1.25rem;">
              Pick a date to see how many days you were in the country during the 180 days before it, including that day.
            </p>
            <div class="row">
              <div class="field">
                <label>Reference Date</label>
                <input type="date" id="rollingDateInput" value="${rollingDate}">
              </div>
              <button class="btn gold" id="calcRolling">Calculate</button>
            </div>
            ${rollingResult}
          </div>

          <p class="eyebrow pages-label">Passport Pages</p>
          <div class="cal-grid">${calendars}</div>
        `;
      } else {
        mainSections = `
          <div class="paper empty-state">
            <div class="stamp"><span class="num" style="font-size:1.6rem;">0</span><span class="lbl">Days</span></div>
            <h3>No trips recorded yet</h3>
            <p>Add your first arrival and departure date above to begin the ledger.</p>
          </div>
        `;
      }

      root.innerHTML = `
        <div class="wrap">
          <header class="header">
            <div class="header-inner">
              <p class="eyebrow" style="color: var(--teal);">Presence &amp; Residency Ledger</p>
              <h1>Country Days Tracker</h1>
              <p class="sub">Log every trip and know exactly how many days you've spent in the country.</p>
            </div>
          </header>
          <div class="container">
            <div class="paper card">
              <p class="eyebrow" style="color: var(--teal); margin:0 0 0.25rem;">Entry 01</p>
              <h2 class="card-title">Add a Trip</h2>
              <div class="row">
                <div class="field">
                  <label>Arrival</label>
                  <input type="date" id="newStart" value="${newTrip.start}">
                </div>
                <div class="field">
                  <label>Departure</label>
                  <input type="date" id="newEnd" value="${newTrip.end}">
                </div>
                <button class="btn" id="addTripBtn">Add Trip</button>
              </div>
              ${tripListHtml}
            </div>
            ${mainSections}
          </div>
        </div>
      `;

      attachHandlers();
    }

    function attachHandlers() {
      const newStart = document.getElementById('newStart');
      const newEnd = document.getElementById('newEnd');
      if (newStart) newStart.addEventListener('change', e => { newTrip.start = e.target.value; });
      if (newEnd) newEnd.addEventListener('change', e => { newTrip.end = e.target.value; });

      const addBtn = document.getElementById('addTripBtn');
      if (addBtn) addBtn.addEventListener('click', () => {
        if (newTrip.start && newTrip.end) {
          const start = new Date(newTrip.start);
          const end = new Date(newTrip.end);
          if (start <= end) {
            trips.push({ start: newTrip.start, end: newTrip.end });
            newTrip = { start: '', end: '' };
            render();
          }
        }
      });

      document.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.getAttribute('data-remove'), 10);
          trips = trips.filter((_, i) => i !== idx);
          render();
        });
      });

      const customStart = document.getElementById('customStart');
      const customEnd = document.getElementById('customEnd');
      if (customStart) customStart.addEventListener('change', e => { customRange.start = e.target.value; });
      if (customEnd) customEnd.addEventListener('change', e => { customRange.end = e.target.value; });

      const calcCustomBtn = document.getElementById('calcCustom');
      if (calcCustomBtn) calcCustomBtn.addEventListener('click', () => {
        if (customRange.start && customRange.end) {
          const start = new Date(customRange.start + 'T00:00:00');
          const end = new Date(customRange.end + 'T00:00:00');
          if (start <= end) {
            let count = 0;
            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
              if (isDateInTrips(d)) count++;
            }
            customDays = count;
            render();
          }
        }
      });

      const rollingInput = document.getElementById('rollingDateInput');
      if (rollingInput) rollingInput.addEventListener('change', e => { rollingDate = e.target.value; });

      const calcRollingBtn = document.getElementById('calcRolling');
      if (calcRollingBtn) calcRollingBtn.addEventListener('click', () => {
        if (rollingDate) {
          const endDate = new Date(rollingDate + 'T00:00:00');
          const startDate = new Date(endDate);
          startDate.setDate(startDate.getDate() - 179);
          let count = 0;
          for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
            if (isDateInTrips(d)) count++;
          }
          rollingDays = count;
          render();
        }
      });
    }

    render();
  </script>
</body>
</html>
